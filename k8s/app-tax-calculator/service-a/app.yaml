apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-a

spec:
  replicas: 1

  selector:
    matchLabels:
      app: app-a

  template:
    metadata:
      labels:
        app: app-a

    spec:
      containers:
      - name: app-a
        image: embarkx/tax-service-a:latest

        ports:
        - containerPort: 3000

        env:
        - name: TAX_SERVICE_URL
          value: "http://app-b:4000"

---
apiVersion: v1
kind: Service
metadata:
  name: app-a

spec:
  selector:
    app: app-a

  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 32000

  type: NodePort
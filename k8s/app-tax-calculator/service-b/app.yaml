apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-b

spec:
  replicas: 1

  selector:
    matchLabels:
      app: app-b

  template:
    metadata:
      labels:
        app: app-b

    spec:
      containers:
      - name: app-b
        image: embarkx/tax-service-b:latest

        ports:
        - containerPort: 4000

---
apiVersion: v1
kind: Service
metadata:
  name: app-b
spec:
  selector:
    app: app-b

  ports:
  - port: 4000
    targetPort: 4000

  type: ClusterIP
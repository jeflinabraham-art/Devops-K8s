name: Second Workflow

on:
  push:
    branches:
      - main

env:
  ENV1: "workflow-level-env"
jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ENV2: "job-level-env"

    steps: 
      - name: say hello
        run: echo "Hello, World!"

      - name: use env and secrets
        run: echo "Application Environment is $APP_ENV (step-level-env), password is ${{ secrets.APP_PASSWORD }}"
        env:
          APP_ENV: "UAT"

      - name: use env variables
        run: echo "Job level environment variable is $ENV2, workflow level environment variable is $ENV1"

      - name: create a file
        run: echo "This is a test file" > test.txt

      # - name: upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-artifact
      #     path: test.txt
  
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: download artifact
        uses: actions/download-artifact@v4
        with:
          name: test-artifact